<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <title>重要事項のまとめ</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <!-- KaTeX CSS for math rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <!-- markdown-it for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/markdown-it@13/dist/markdown-it.min.js"></script>
    <!-- KaTeX for math rendering -->
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <style>
        body {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1rem;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.7;
            color: #333;
        }
        h1, h2, h3, h4, h5, h6 { margin-top: 1.5rem; margin-bottom: 0.5rem; }
        pre {
            background: #f6f8fa;
            border: 1px solid #e1e4e8;
            border-radius: 6px;
            padding: 1rem;
            overflow-x: auto;
        }
        code {
            background: #f6f8fa;
            padding: 0.2em 0.4em;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
        }
        pre code {
            background: none;
            padding: 0;
        }
        blockquote {
            margin: 1rem 0;
            padding-left: 1rem;
            border-left: 4px solid #ddd;
            color: #666;
        }
        ul, ol { margin: 1rem 0; }
        li { margin: 0.5rem 0; }
    </style>
</head>
<body>
<div id ="header">
    <h1>重要事項のまとめ</h1>
    <p>数学：授業プリントやプロミネンスを読み込ませてAIに基本事項や解法などをまとめさせました。</p>
    <p>英語：表現をまとめたり、Cutting Edgeの重要ポイントをAIにまとめさせました。</p>
    <p>PDF化は「共有」→印刷→PDFで可能です。</p>
    <p></p>
    <p>併せてこちらもどうぞ：https://nari0518.github.io/Flashcards/</p>
</div>
<div id="controls" style="margin-bottom:1rem;">
  <input id="filter" placeholder="絞り込み (例: R7, 数A)" style="display:none; padding:0.4rem; width:60%;" />
  <button id="home-button" style="display:none; margin-left:0.5rem; padding:0.4rem 0.8rem;">ホームへ戻る</button>
</div>
<div id="content">読み込み中…</div>

<script>
window.addEventListener('load', function() {
    // markdown-it インスタンス
    const md = window.markdownit({html: true, linkify: true, breaks: true});

    // ファイル一覧を保持 (フィルタ用)
    window.currentList = [];

    const filterInput = document.getElementById('filter');
    const homeButton = document.getElementById('home-button');
    homeButton.addEventListener('click', navigateToHome);
    filterInput.addEventListener('input', function() {
        const q = this.value.trim().toLowerCase();
        if (!q) {
            renderList(window.currentList);
        } else {
            const filtered = window.currentList.filter(item =>
                item.displayName.toLowerCase().includes(q) ||
                item.filename.toLowerCase().includes(q) ||
                item.year.toLowerCase().includes(q) ||
                item.area.toLowerCase().includes(q)
            );
            renderList(filtered);
        }
    });

    window.addEventListener('popstate', function(e) {
        const state = e.state;
        if (state && state.file) {
            loadFile(state.file);
        } else {
            showHome();
        }
    });

    function parseFilename(fname) {
        const base = fname.replace(/\.md$/i, '');
        const [year = '', area = '', test = ''] = base.split('-');
        return {year, area, test};
    }

    function formatDisplayName(meta) {
        const areaMap = {A: '数A', B: '数B', I: '数Ⅰ', II: '数Ⅱ', III: '数Ⅲ', C: '数C'};
        const testMap = {'1': '1学期中間', '2': '1学期末', '3': '2学期中間', '4': '2学期末', '5': '学年末'};
        const areaName = areaMap[meta.area] || meta.area;
        const testName = testMap[meta.test] || meta.test;
        return `${meta.year}_${areaName}_${testName}`;
    }

    function renderList(list) {
        const container = document.getElementById('content');
        container.innerHTML = '';
        if (list.length === 0) {
            container.innerHTML = '<p>ファイルがありません。</p>';
            return;
        }
        const ul = document.createElement('ul');
        list.forEach(item => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = '?file=docs/' + item.filename;
            a.textContent = item.displayName;
            a.addEventListener('click', function(e) {
                e.preventDefault();
                navigateToFile(item.filename);
            });
            li.appendChild(a);
            ul.appendChild(li);
        });
        container.appendChild(ul);
    }

    function showHome() {
        // ヘッダを表示
        document.getElementById('header').style.display = '';
        homeButton.style.display = 'none';
        filterInput.style.display = 'inline-block';
        document.getElementById('content').innerHTML = '<p>読み込み中…</p>';
        fetch('docs/files.json')
            .then(r => r.json())
            .then(list => {
                window.currentList = list;
                renderList(list);
            })
            .catch(err => {
                document.getElementById('content').innerHTML = '<p style="color:red;">エラー:' + err.message + '</p>';
            });
    }

    function loadFile(filename) {
        // ヘッダを隠す
        document.getElementById('header').style.display = 'none';
        homeButton.style.display = 'inline-block';
        filterInput.style.display = 'none';
        fetch('docs/' + filename)
            .then(r => {
                if (!r.ok) throw new Error('Failed to fetch ' + filename);
                return r.text();
            })
            .then(mdtext => {
                const html = md.render(mdtext);
                document.getElementById('content').innerHTML = html;
                if (window.renderMathInElement) {
                    renderMathInElement(document.getElementById('content'), {
                        delimiters: [
                            {left: '$$', right: '$$', display: true},
                            {left: '$', right: '$', display: false}
                        ]
                    });
                }
            })
            .catch(err => {
                document.getElementById('content').innerHTML = '<p style="color:red;">エラー:' + err.message + '</p>';
            });
    }

    function navigateToFile(filename) {
        const url = '?file=docs/' + filename;
        history.pushState({file: filename}, '', url);
        loadFile(filename);
    }

    function navigateToHome() {
        history.pushState({}, '', window.location.pathname);
        showHome();
    }

    // 初期ロード
    const params = new URLSearchParams(location.search);
    const fileParam = params.get('file');
    if (fileParam) {
        const fname = fileParam.replace(/^docs\//, '');
        history.replaceState({file: fname}, '', location.href);
        loadFile(fname);
    } else {
        showHome();
    }
});
</script>
</body>
</html>
